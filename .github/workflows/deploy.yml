name: Deploy to EC2 via GHCR

on:
  push:
    branches:
      - main

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Images
        run: |
          # 1. Create empty dummy files for backends so Docker Compose doesn't crash
          touch backend/.env
          touch stem/stem_backend/.env
          
          # 2. Inject your real GitHub Secrets for the frontends
          echo "${{ secrets.FRONTEND_ENV }}" > frontend/.env
          echo "${{ secrets.STEM_FRONTEND_ENV }}" > stem/stem_frontend/.env
          
          # 3. Build and push!
          docker compose build
          docker compose push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd lms-project
            git pull origin main
            
            # Pull the pre-built images from GHCR
            sudo docker compose pull
            
            # Run the new containers in the background
            sudo docker compose up -d